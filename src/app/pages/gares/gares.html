<!-- 🔴 Message d'erreur -->


<div class="row mt-3">

  
  <div class="alert alert-warning" role="alert" *ngIf="errormsg">
    {{ errormsg }}
  </div>
  <div class="col-lg-12">
    <div class="card-style mb-30">
      <h6 class="mb-10">Gares</h6>

      <app-add routerLink="/admin/gare/new">Ajouter une gare</app-add>
      <div class="table-wrapper table-responsive">
        <table class="table">

          <thead>
            <tr>
              <th><h6>Nom</h6></th>
              <th><h6>Action</h6></th>
            </tr>
          </thead>

          <tbody>
                <tr *ngFor="let gare of garesPagines">
              <td class="min-width">
                <p>{{ gare.nom }}</p>
              </td>


              <td>
                <div class="action">
                
                  <app-delete (click)="deleteGare(gare)"></app-delete>

                  <app-see [routerLink]="['/admin/gare', gare.id]"> </app-see>
                  <app-update [routerLink]="['/admin/gare/update', gare.id]"> </app-update>
                 
                </div>
              </td>

            </tr>

          </tbody>

        </table>
      </div>
    
      <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
          <button
              class="btn btn-secondary"
              [disabled]="currentPage === 1"
              (click)="changePage(currentPage - 1)">
              Précédent
          </button>

          <span>Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-secondary"
          [disabled]="currentPage === totalPages"
          (click)="changePage(currentPage + 1)">
          Suivant
        </button>
      </div>
    </div>

</div>
</div>
