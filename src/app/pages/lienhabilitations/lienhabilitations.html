<app-add routerLink="/admin/liens-habilitation/new">Ajouter une habilitation</app-add>
<div class="row">

    <div *ngIf="errorMessage()?.length" class="alert-box danger-alert  mt-4">
      <div class="alert">
        <p class="text-medium">
          {{ errorMessage() }}
        </p>
      </div>
    </div>

  <div class="col-lg-12">
    <div class="card-style mb-30">

      <div class="table-wrapper table-responsive">
        <table class="table">

          <thead>
            <tr>
              <th><h6>Type d'habilitation</h6></th>
              <th><h6>Appli / Outil</h6></th>
              <th><h6>Lien</h6></th>
              <th><h6>Lien pour habiliter</h6></th>
              <th><h6>Notes / Commentaire</h6></th>
              <th><h6>Actions</h6></th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let lien of lienHabilitation">
              <td class="min-width">
                <p>{{ lien.typeHabilitation?.type }}</p>
              </td>

              <td class="min-width">
                <p>
                 {{ lien.outil }}
                </p>
              </td>              
              
              <td class="min-width">
                <p>
                 {{ lien.lien }}
                </p>
              </td>

              <td class="min-width">
                <p>{{ lien.urlHabilitation }}</p>
              </td>              
              
              <td class="min-width">
                <p>{{ lien.description }} </p>
              </td>              
              
              <td>
                <div class="action">
                
                  <app-delete (click)="deletelien(lien)"></app-delete>

                  <app-see [routerLink]="['/admin/liens-habilitation', lien.id]"> </app-see>
                  <app-update [routerLink]="['/admin/liens-habilitation/update', lien.id]"> </app-update> 
                 
                </div>
              </td>

            </tr>

          </tbody>

        </table>
      </div>
    
      <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
          <button
              class="btn btn-secondary"
              [disabled]="currentPage === 1"
              (click)="changePage(currentPage - 1)">
              Précédent
          </button>

          <span>Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-secondary"
          [disabled]="currentPage === totalPages"
          (click)="changePage(currentPage + 1)">
          Suivant
        </button>
      </div>
    </div>

</div>
</div>
