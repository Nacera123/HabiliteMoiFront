<div class="row mt-3">

  
  <div class="alert alert-warning" role="alert" *ngIf="errormsg">
    {{ errormsg }}
  </div>
  <div class="col-lg-12">
    <div class="card-style mb-30">
      <h6 class="mb-10">Direction</h6>

      <app-add routerLink="/admin/pole/new">Ajouter un Pole</app-add>
      <div class="table-wrapper table-responsive">
        <table class="table">

          <thead>
            <tr>
              <th><h6>Pole</h6></th>
              <th><h6>Direction</h6></th>
              <th><h6>Responsable</h6></th>
              <th><h6>Adjoint du Directeur</h6></th>
              <th><h6>Action</h6></th>
            </tr>
          </thead>

          <tbody>
                <tr *ngFor="let pole of polesPagines">
              <td class="min-width">
                <p>{{ pole.nom }}</p>
              </td>

              <td class="min-width">
                <p>
                 {{ pole.direction?.service }}
                </p>
              </td>              
              
              <td class="min-width">
                <p>
                 {{ pole.employes?.nom }}  {{ pole.employes?.prenom }}
                </p>
              </td>

              <td class="min-width">
                <p>{{ pole.adjoint }}</p>
              </td>



              <td>
                <div class="action">
                
                  <app-delete (click)="deletePole(pole)"></app-delete>

                  <app-see [routerLink]="['/admin/pole', pole.id]"> </app-see>
                  <app-update [routerLink]="['/admin/pole/update', pole.id]"> </app-update>
                 
                </div>
              </td>

            </tr>

          </tbody>

        </table>
      </div>
    
      <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
          <button
              class="btn btn-secondary"
              [disabled]="currentPage === 1"
              (click)="changePage(currentPage - 1)">
              Précédent
          </button>

          <span>Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-secondary"
          [disabled]="currentPage === totalPages"
          (click)="changePage(currentPage + 1)">
          Suivant
        </button>
      </div>
    </div>

</div>
</div>
