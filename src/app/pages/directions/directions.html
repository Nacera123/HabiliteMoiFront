<app-add routerLink="/admin/direction/new">Ajouter une Direction</app-add>
<div class="row">

    <div *ngIf="errorMessage()?.length" class="alert-box danger-alert mt-4">
      <div class="alert">
        <p class="text-medium">
          {{ errorMessage() }}
        </p>
      </div>
    </div>


  <div class="col-lg-12" >
    <div class="card-style mb-30">
    
      <div class="table-wrapper table-responsive">
        <table class="table">

          <thead>
            <tr>
              <th><h6>Directions</h6></th>
              <th><h6>responsable</h6></th>
              <th><h6>Adjoint </h6></th>
              <th><h6>Actions</h6></th>
            </tr>
          </thead>

          <tbody>
                <tr *ngFor="let direction of directionsPagines">
              <td class="min-width">
                <p>{{ direction.service }}</p>
              </td>

              <td class="min-width">
                <p>
                 {{ direction.employes?.nom }}  {{ direction.employes?.prenom }}
                </p>
              </td>

              <td class="min-width">
                <p>{{ direction.adjoint }}</p>
              </td>



              <td class="action"> 
                
                  <app-delete (click)="deleteDirection(direction)"></app-delete>

                  <app-see [routerLink]="['/admin/direction', direction.id]"> </app-see>
                  <app-update [routerLink]="['/admin/direction/update', direction.id]"> </app-update>
                 
              </td>

            </tr>

          </tbody>

        </table>
      </div>
    
      <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
          <button
              class="btn btn-secondary"
              [disabled]="currentPage === 1"
              (click)="changePage(currentPage - 1)">
              Précédent
          </button>

          <span>Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-secondary"
          [disabled]="currentPage === totalPages"
          (click)="changePage(currentPage + 1)">
          Suivant
        </button>
      </div>
    </div>

  </div>
</div>
