<app-add routerLink="/admin/type-habilitation/new">Ajouter un type d'habilitation</app-add>

<div class="row">

    <div *ngIf="errorMessage()?.length" class="alert-box danger-alert  mt-4">
      <div class="alert">
        <p class="text-medium">
          {{ errorMessage() }}
        </p>
      </div>
    </div>


  <div class="col-lg-12">
    <div class="card-style mb-30">
      <div class="table-wrapper table-responsive">

        <table class="table">

          <thead>
            <tr>
              <th><h6>Type</h6></th>
              <th><h6>Actions</h6></th>
            </tr>
          </thead>

          <tbody>
              <tr *ngFor="let type of typesPagines">
                <td class="min-width">
                  <p>{{ type.type }}</p>
                </td>

                <td>
                  <div class="action">
                  
                    <app-delete (click)="deleteType(type)"></app-delete>

                    <!-- <app-see [routerLink]="['/admin/employes', employe.id]"> </app-see> -->
                    <app-update [routerLink]="['/admin/type-habilitation/update', type.id]"> </app-update> 
                  
                  </div>
                </td>

            </tr>

          </tbody>

        </table>
      </div>
    
      <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
          <button
              class="btn btn-secondary"
              [disabled]="currentPage === 1"
              (click)="changePage(currentPage - 1)">
              Précédent
          </button>

          <span>Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-secondary"
          [disabled]="currentPage === totalPages"
          (click)="changePage(currentPage + 1)">
          Suivant
        </button>
      </div>
    </div>

</div>
</div>
