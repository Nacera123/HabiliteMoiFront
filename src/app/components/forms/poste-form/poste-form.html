<h2 class="card-title pt-4 pb-4">
  {{ formulaire ? 'Modifier un poste' : 'Créer un poste' }}
</h2>

<div class="card-body" style="width:500px;margin-bottom:200px;" *ngIf="form">

  <div *ngIf="errorMessage()?.length" class="alert alert-danger text-center p-4 m-4">
    {{ errorMessage() }}
  </div>

  <form class="row g-3" [formGroup]="form" (ngSubmit)="create()">

    <div class="col-12">
      <label class="form-label">Intitulé</label>
      <input
        type="text"
        class="form-control"
        formControlName="intitule">
    </div>

    <div class="col-12 mb-2">
        <label class="form-label">Occupé par</label>

        <select
            class="form-select"
            formControlName="employes"
            [compareWith]="compareEmploye">

            <option [ngValue]="null", disabled>
                Choisir un(e) employé(e)
            </option>
            <option [ngValue]="null">
                Aucun employé(e)
            </option>
            <option
            *ngFor="let e of employes"
            [ngValue]="e">
            {{ e.nom }} {{ e.prenom }}
            </option>

        </select>
    </div>
    <div class="col-12 mb-2">
        <label class="form-label">Appartient a un Pôle</label>

        <select
            class="form-select"
            formControlName="pole"
            [compareWith]="compareDirection">

            <option [ngValue]="null", disabled>
                Choisir un pôle
            </option>
            <option [ngValue]="null">
                Aucun pôle
            </option>
            <option
                *ngFor="let p of pole"
                [ngValue]="p">
                {{ p.nom }} 
            </option>

        </select>
    </div>

    <div class="col-12 mb-2">
        <label class="form-label">ou a une Direction</label>

        <select
            class="form-select"
            formControlName="direction"
            [compareWith]="compareDirection">

            <option [ngValue]="null", disabled>
                Choisir une direction
            </option>
            <option [ngValue]="null">
                Aucune direction
            </option>
            <option
                *ngFor="let d of direction"
                [ngValue]="d">
                {{ d.service }} 
            </option>

        </select>
    </div>

    <div class="col-12 d-flex align-items-center gap-3">
      <label class="form-label mb-0">Adjoint du responsable de pôle</label>

      <button
        type="button"
        class="btn btn-sm"
        [class.btn-success]="form.value.adjoint"
        [class.btn-outline-secondary]="!form.value.adjoint"
        (click)="toggleAdjoint()">

        {{ form.value.adjoint ? 'Oui' : 'Non' }}

      </button>
    </div>

    <div class="col-12">
      <button
        type="submit"
        class="btn btn-warning btn-lg text-light"
        [disabled]="form.invalid">

        Valider

      </button>
    </div>

  </form>

</div>
