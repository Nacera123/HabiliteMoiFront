
<div class="form-elements-wrapper">
  <div class="card-style mb-30">
    
    <h6 class="mb-25">{{ formulaire ? 'Modifier un employé' : 'Créer un employé' }}</h6>

    <div *ngIf="errorMessage()?.length" class="alert-box danger-alert pl-100">
      <div class="alert">
        <p class="text-medium">
          {{ errorMessage() }}
        </p>
      </div>
    </div>

    <form class="row g-3" [formGroup]="form" (ngSubmit)="create()">

      <div class="input-style-1">
        <label>Nom</label>
        <input type="text" placeholder="Nom de l'employé(e)" formControlName="nom">
      </div>

      <div class="input-style-1">
        <label>Prénom</label>
        <input type="text" placeholder="Prénom de l'employé(e)" formControlName="prenom">
      </div>

      <div class="input-style-3">
        <label>Email</label>
        <input type="email" placeholder="Email de l'employé(e)" formControlName="email">
      </div>

      <div class="input-style-3">
        <label>Téléphone</label>
        <input type="tel" placeholder="numéro de téléphone de l'employé(e)" formControlName="tel">
      </div>

      <div class="col-12 d-flex justify-content-center align-items-center gap-3 mt-4">
        <app-validate></app-validate>
        <app-return-form [routerLink]="['/admin/employes']"></app-return-form>
      </div>



    </form>



  </div>

</div>
